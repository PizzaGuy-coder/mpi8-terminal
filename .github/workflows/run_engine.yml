name: MPI 8 Live Index Engine

on:
  workflow_dispatch:

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Repository Assets
      uses: actions/checkout@v4

    - name: Initialize Cloud Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Scraper Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Execute MPI 8 Calculation Core
      run: python mpi8_engine.py

    - name: Commit and Push Secure Data Updates
      run: |
        git config --global user.name "MPI-8-Bot"
        git config --global user.email "bot@mpi8.internal"
        git add api.json
        git diff-index --quiet HEAD || git commit -m "Engine Tick: Updated Market Metrics [External Cron Trigger]"
        git push
